<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">ShopVerse</a>
      <nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a><a href="/pages/cart.html" class="active">Cart</a></nav>
      <div class="nav-icons">
        <button class="nav-icon theme-toggle" id="theme-toggle">🌙</button>
        <a href="/pages/cart.html" class="nav-icon">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a>
        <div id="auth-nav" style="display:flex;gap:0.5rem;"><a href="/pages/login.html" class="btn btn-outline btn-sm">Login</a><a href="/pages/register.html" class="btn btn-primary btn-sm">Register</a></div>
        <div class="user-menu" id="user-nav" style="display:none;">
          <button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">User</span> ▾</button>
          <div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html">👤 My Profile</a><a href="/pages/orders.html">📦 My Orders</a><a href="/pages/admin/dashboard.html" id="admin-link" style="display:none;">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="cart-page">
    <div class="container">
      <h1>🛒 Shopping Cart</h1>
      <div id="cart-container">
        <div class="page-loader"><div class="spinner"></div><p>Loading cart...</p></div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 ShopVerse. All rights reserved.</span><span>Made with ❤️</span></div></div></footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getCart, updateCartItem, removeFromCart, clearCart, calculateCartTotal, updateCartCount } from '/js/cart/cart.js';
    import { formatPrice, getImageUrl } from '/js/utils/helpers.js';
    import { showToast } from '/js/utils/toast.js';
    import { confirmDialog } from '/js/utils/modal.js';
    import { isAuthenticated } from '/js/auth/auth.js';

    const container = document.getElementById('cart-container');

    const renderCart = async () => {
      try {
        const cart = await getCart();
        const products = cart.products || [];

        if (products.length === 0) {
          container.innerHTML = `
            <div class="cart-empty">
              <div class="icon" style="display: flex; justify-content: center; margin-bottom: var(--space-md); color: var(--color-text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
              </div>
              <h3>Your cart is empty</h3>
              <p>Looks like you haven't added any products yet.</p>
              <a href="/pages/products.html" class="btn btn-primary">Browse Products</a>
            </div>`;
          return;
        }

        const total = calculateCartTotal(products);

        container.innerHTML = `
          <div class="cart-layout">
            <div class="cart-items">
              ${products.map((item) => {
                const p = item.product;
                if (!p) return '';
                const img = p.images && p.images[0] ? getImageUrl(p.images[0]) : '';
                return `
                  <div class="cart-item" data-id="${p._id}">
                    <div class="cart-item-image">
                      ${img ? `<img src="${img}" alt="${p.title}">` : `<div class="no-image" style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-muted);"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></div>`}
                    </div>
                    <div class="cart-item-details">
                      <h4><a href="/pages/product.html?id=${p._id}">${p.title}</a></h4>
                      <div class="price">${formatPrice(p.price)}</div>
                    </div>
                    <div class="cart-item-quantity">
                      <button class="qty-dec" data-id="${p._id}">−</button>
                      <span>${item.quantity}</span>
                      <button class="qty-inc" data-id="${p._id}">+</button>
                    </div>
                    <button class="cart-item-remove" data-id="${p._id}" title="Remove">✕</button>
                  </div>
                `;
              }).join('')}
              <button class="btn btn-secondary btn-sm" id="clear-cart-btn">Clear Cart</button>
            </div>
            <div class="cart-summary">
              <h3>Order Summary</h3>
              <div class="cart-summary-row"><span>Subtotal (${products.reduce((s, i) => s + i.quantity, 0)} items)</span><span>${formatPrice(total)}</span></div>
              <div class="cart-summary-row"><span>Shipping</span><span>${total > 50 ? 'Free' : formatPrice(9.99)}</span></div>
              <div class="cart-summary-row total"><span>Total</span><span>${formatPrice(total > 50 ? total : total + 9.99)}</span></div>
              <a href="${isAuthenticated() ? '/pages/checkout.html' : '/pages/login.html'}" class="btn btn-primary btn-block btn-lg">
                ${isAuthenticated() ? 'Proceed to Checkout →' : 'Login to Checkout →'}
              </a>
            </div>
          </div>
        `;

        // Events
        container.querySelectorAll('.qty-dec').forEach((btn) =>
          btn.addEventListener('click', async () => {
            const item = products.find((i) => i.product._id === btn.dataset.id);
            if (item && item.quantity > 1) {
              await updateCartItem(btn.dataset.id, item.quantity - 1);
              renderCart();
            }
          })
        );

        container.querySelectorAll('.qty-inc').forEach((btn) =>
          btn.addEventListener('click', async () => {
            const item = products.find((i) => i.product._id === btn.dataset.id);
            if (item) {
              await updateCartItem(btn.dataset.id, item.quantity + 1);
              renderCart();
            }
          })
        );

        container.querySelectorAll('.cart-item-remove').forEach((btn) =>
          btn.addEventListener('click', async () => {
            await removeFromCart(btn.dataset.id);
            renderCart();
          })
        );

        document.getElementById('clear-cart-btn')?.addEventListener('click', async () => {
          const ok = await confirmDialog('Are you sure you want to clear your cart?');
          if (ok) { await clearCart(); renderCart(); }
        });
      } catch {
        container.innerHTML = '<p class="text-center text-muted p-xl">Failed to load cart</p>';
      }
    };

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
