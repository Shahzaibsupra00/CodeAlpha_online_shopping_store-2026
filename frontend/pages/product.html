<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product details — view specifications, images, and add to cart.">
  <title>Product Details — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">ShopVerse</a>
      <nav class="nav-links" id="nav-links">
        <a href="/">Home</a>
        <a href="/pages/products.html">Products</a>
        <a href="/pages/cart.html">Cart</a>
      </nav>
      <div class="nav-icons">
        <button class="nav-icon theme-toggle" id="theme-toggle">🌙</button>
        <a href="/pages/cart.html" class="nav-icon">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a>
        <div id="auth-nav" style="display:flex;gap:0.5rem;">
          <a href="/pages/login.html" class="btn btn-outline btn-sm">Login</a>
          <a href="/pages/register.html" class="btn btn-primary btn-sm">Register</a>
        </div>
        <div class="user-menu" id="user-nav" style="display:none;">
          <button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">User</span> ▾</button>
          <div class="user-dropdown" id="user-dropdown">
            <a href="/pages/profile.html">👤 My Profile</a>
            <a href="/pages/orders.html">📦 My Orders</a>
            <a href="/pages/admin/dashboard.html" id="admin-link" style="display:none;">⚙️ Admin Panel</a>
            <div class="divider"></div>
            <button id="logout-btn">🚪 Logout</button>
          </div>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="product-detail">
    <div class="container">
      <div id="product-detail-container">
        <div class="page-loader"><div class="spinner"></div><p>Loading product...</p></div>
      </div>

      <section class="related-products">
        <h2 class="section-title">Related Products</h2>
        <div id="related-products"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2025 ShopVerse. All rights reserved.</span>
        <span>Made with ❤️</span>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { fetchProductById, fetchRelatedProducts, renderProductDetail, renderProductGrid } from '/js/product/product.js';
    import { getQueryParam } from '/js/utils/helpers.js';
    import { showToast } from '/js/utils/toast.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const id = getQueryParam('id');
      if (!id) {
        window.location.href = '/pages/products.html';
        return;
      }

      const container = document.getElementById('product-detail-container');
      const relatedEl = document.getElementById('related-products');

      try {
        const data = await fetchProductById(id);
        const product = data.data.product;
        document.title = `${product.title} — ShopVerse`;
        renderProductDetail(container, product);

        // Load related
        try {
          const relData = await fetchRelatedProducts(id);
          if (relData.data && relData.data.length > 0) {
            renderProductGrid(relatedEl, relData.data);
          } else {
            document.querySelector('.related-products').style.display = 'none';
          }
        } catch {
          document.querySelector('.related-products').style.display = 'none';
        }
      } catch (error) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">😕</div>
            <h3>Product Not Found</h3>
            <p>The product you're looking for doesn't exist.</p>
            <a href="/pages/products.html" class="btn btn-primary">Browse Products</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
