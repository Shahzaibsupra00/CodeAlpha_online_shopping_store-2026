<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a><a href="/pages/cart.html">Cart</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button><a href="/pages/cart.html" class="nav-icon">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a><div id="auth-nav" style="display:none;"></div><div class="user-menu" id="user-nav" style="display:none;"><button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">User</span> ▾</button><div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html" class="active">👤 My Profile</a><a href="/pages/orders.html">📦 My Orders</a><a href="/pages/admin/dashboard.html" id="admin-link" style="display:none;">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div></div><button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button></div></div></header>

  <main class="profile-page">
    <div class="container">
      <div class="profile-layout">
        <aside class="profile-sidebar">
          <div class="profile-avatar" id="profile-avatar">U</div>
          <div class="user-name" id="profile-name">User</div>
          <div class="user-email" id="profile-email">user@example.com</div>
          <nav class="profile-nav">
            <a href="#" class="active" data-tab="profile">👤 Edit Profile</a>
            <a href="#" data-tab="password">🔒 Change Password</a>
            <a href="/pages/orders.html" data-tab="orders">📦 My Orders</a>
          </nav>
        </aside>

        <div class="profile-content">
          <!-- Profile Tab -->
          <div class="profile-section" id="tab-profile">
            <h2>Edit Profile</h2>
            <form id="profile-form">
              <div class="form-row">
                <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="prof-name" required></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="prof-email" required></div>
              </div>
              <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="prof-phone"></div>
              <h4 class="mt-xl mb-lg">Address</h4>
              <div class="form-group"><label class="form-label">Street</label><input type="text" class="form-input" id="prof-street"></div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">City</label><input type="text" class="form-input" id="prof-city"></div>
                <div class="form-group"><label class="form-label">State</label><input type="text" class="form-input" id="prof-state"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">ZIP Code</label><input type="text" class="form-input" id="prof-zip"></div>
                <div class="form-group"><label class="form-label">Country</label><input type="text" class="form-input" id="prof-country"></div>
              </div>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>

          <!-- Password Tab -->
          <div class="profile-section hidden" id="tab-password">
            <h2>Change Password</h2>
            <form id="password-form">
              <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-input" id="current-password" required></div>
              <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="new-password" required></div>
              <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-input" id="confirm-new-password" required></div>
              <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 ShopVerse. All rights reserved.</span></div></div></footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { isAuthenticated, getProfile, updateProfile, changePassword } from '/js/auth/auth.js';
    import { showToast } from '/js/utils/toast.js';
    import { setButtonLoading } from '/js/utils/loader.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isAuthenticated()) { window.location.href = '/pages/login.html'; return; }

      // Tab navigation
      document.querySelectorAll('.profile-nav a[data-tab]').forEach((link) => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.profile-nav a').forEach((l) => l.classList.remove('active'));
          link.classList.add('active');
          document.querySelectorAll('.profile-section').forEach((s) => s.classList.add('hidden'));
          document.getElementById(`tab-${link.dataset.tab}`)?.classList.remove('hidden');
        });
      });

      // Load profile
      try {
        const user = await getProfile();
        document.getElementById('profile-avatar').textContent = user.name?.charAt(0).toUpperCase() || 'U';
        document.getElementById('profile-name').textContent = user.name;
        document.getElementById('profile-email').textContent = user.email;
        document.getElementById('prof-name').value = user.name || '';
        document.getElementById('prof-email').value = user.email || '';
        document.getElementById('prof-phone').value = user.phone || '';
        document.getElementById('prof-street').value = user.address?.street || '';
        document.getElementById('prof-city').value = user.address?.city || '';
        document.getElementById('prof-state').value = user.address?.state || '';
        document.getElementById('prof-zip').value = user.address?.zipCode || '';
        document.getElementById('prof-country').value = user.address?.country || '';
      } catch { showToast('Failed to load profile', 'error'); }

      // Update profile
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        setButtonLoading(btn, true);
        try {
          await updateProfile({
            name: document.getElementById('prof-name').value,
            email: document.getElementById('prof-email').value,
            phone: document.getElementById('prof-phone').value,
            address: {
              street: document.getElementById('prof-street').value,
              city: document.getElementById('prof-city').value,
              state: document.getElementById('prof-state').value,
              zipCode: document.getElementById('prof-zip').value,
              country: document.getElementById('prof-country').value,
            },
          });
          showToast('Profile updated!', 'success');
        } catch (err) { showToast(err.message || 'Failed to update profile', 'error'); }
        finally { setButtonLoading(btn, false); }
      });

      // Change password
      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPwd = document.getElementById('new-password').value;
        const confirmPwd = document.getElementById('confirm-new-password').value;
        if (newPwd !== confirmPwd) { showToast('Passwords do not match', 'error'); return; }
        if (newPwd.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }

        const btn = e.target.querySelector('button[type="submit"]');
        setButtonLoading(btn, true);
        try {
          await changePassword(document.getElementById('current-password').value, newPwd);
          showToast('Password changed!', 'success');
          e.target.reset();
        } catch (err) { showToast(err.message || 'Failed to change password', 'error'); }
        finally { setButtonLoading(btn, false); }
      });
    });
  </script>
</body>
</html>
