<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a><a href="/pages/cart.html">Cart</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button><a href="/pages/cart.html" class="nav-icon">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a><div id="auth-nav" style="display:none;"></div><div class="user-menu" id="user-nav" style="display:none;"><button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">User</span> ▾</button><div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html">👤 My Profile</a><a href="/pages/orders.html">📦 My Orders</a><a href="/pages/admin/dashboard.html" id="admin-link" style="display:none;">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div></div><button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button></div></div></header>

  <main class="profile-page">
    <div class="container">
      <h1 class="mb-xl">📦 My Orders</h1>
      <div id="orders-container">
        <div class="page-loader"><div class="spinner"></div><p>Loading orders...</p></div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 ShopVerse. All rights reserved.</span></div></div></footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getMyOrders } from '/js/order/order.js';
    import { isAuthenticated } from '/js/auth/auth.js';
    import { formatPrice, formatDate, getImageUrl, renderPagination } from '/js/utils/helpers.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isAuthenticated()) { window.location.href = '/pages/login.html'; return; }

      const container = document.getElementById('orders-container');

      const loadOrders = async (page = 1) => {
        try {
          const data = await getMyOrders(page);
          const orders = data.data;

          if (!orders || orders.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="icon">📦</div>
                <h3>No orders yet</h3>
                <p>You haven't placed any orders. Start shopping!</p>
                <a href="/pages/products.html" class="btn btn-primary">Browse Products</a>
              </div>`;
            return;
          }

          container.innerHTML = `
            <div class="orders-list">
              ${orders.map((order) => `
                <div class="order-card">
                  <div class="order-card-header">
                    <span class="order-id">Order #${order._id.slice(-8).toUpperCase()}</span>
                    <span>${formatDate(order.createdAt)}</span>
                    <span class="order-status ${order.status.toLowerCase()}">${order.status}</span>
                  </div>
                  <div class="order-card-body">
                    <div class="order-products">
                      ${order.products.map((item) => `
                        <div class="order-product">
                          <div class="order-product-image">
                            ${item.image ? `<img src="${getImageUrl(item.image)}" alt="">` : '📦'}
                          </div>
                          <div>
                            <strong>${item.title}</strong>
                            <div class="text-muted">Qty: ${item.quantity} × ${formatPrice(item.price)}</div>
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                  <div class="order-card-footer">
                    <span>${order.paymentMethod}</span>
                    <span class="order-total">Total: ${formatPrice(order.totalAmount)}</span>
                  </div>
                </div>
              `).join('')}
            </div>
            ${data.pagination ? renderPagination(data.pagination) : ''}
          `;

          container.querySelectorAll('.pagination-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
              if (btn.dataset.page) loadOrders(parseInt(btn.dataset.page));
            });
          });
        } catch {
          container.innerHTML = '<p class="text-center text-muted p-xl">Failed to load orders</p>';
        }
      };

      loadOrders();
    });
  </script>
</body>
</html>
