<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button><div id="auth-nav" style="display:none;"></div><div class="user-menu" id="user-nav" style="display:none;"><button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">Admin</span> ▾</button><div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html">👤 My Profile</a><a href="/pages/admin/dashboard.html" id="admin-link">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div></div><button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button></div></div></header>

  <main class="admin-page">
    <div class="container">
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <h3>Admin Panel</h3>
          <nav class="admin-nav">
            <a href="/pages/admin/dashboard.html" class="active"><span class="icon">📊</span> Dashboard</a>
            <a href="/pages/admin/products.html"><span class="icon">📦</span> Products</a>
            <a href="/pages/admin/users.html"><span class="icon">👥</span> Users</a>
            <a href="/pages/admin/orders.html"><span class="icon">🛒</span> Orders</a>
          </nav>
        </aside>

        <div class="admin-content">
          <div class="admin-content-header">
            <h1>Dashboard</h1>
          </div>

          <div class="dashboard-stats" id="dashboard-stats">
            <div class="stat-card"><div class="stat-card-header"><div class="stat-card-icon users">👥</div></div><div class="stat-card-value" id="stat-users">—</div><div class="stat-card-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-card-header"><div class="stat-card-icon products">📦</div></div><div class="stat-card-value" id="stat-products">—</div><div class="stat-card-label">Total Products</div></div>
            <div class="stat-card"><div class="stat-card-header"><div class="stat-card-icon orders">🛒</div></div><div class="stat-card-value" id="stat-orders">—</div><div class="stat-card-label">Total Orders</div></div>
            <div class="stat-card"><div class="stat-card-header"><div class="stat-card-icon revenue">💰</div></div><div class="stat-card-value" id="stat-revenue">—</div><div class="stat-card-label">Total Revenue</div></div>
          </div>

          <div class="recent-orders">
            <h3>📋 Recent Orders</h3>
            <div id="recent-orders-table">
              <div class="page-loader"><div class="spinner"></div><p>Loading...</p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getDashboard } from '/js/admin/admin.js';
    import { isAdmin } from '/js/auth/auth.js';
    import { formatPrice, formatDate } from '/js/utils/helpers.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isAdmin()) { window.location.href = '/'; return; }

      try {
        const data = await getDashboard();
        const stats = data.data;

        document.getElementById('stat-users').textContent = stats.totalUsers;
        document.getElementById('stat-products').textContent = stats.totalProducts;
        document.getElementById('stat-orders').textContent = stats.totalOrders;
        document.getElementById('stat-revenue').textContent = formatPrice(stats.revenue);

        const recentEl = document.getElementById('recent-orders-table');
        if (stats.recentOrders && stats.recentOrders.length > 0) {
          recentEl.innerHTML = `
            <table class="admin-table">
              <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
              <tbody>
                ${stats.recentOrders.map((o) => `
                  <tr>
                    <td>#${o._id.slice(-8).toUpperCase()}</td>
                    <td>${o.user?.name || 'N/A'}</td>
                    <td>${formatPrice(o.totalAmount)}</td>
                    <td><span class="order-status ${o.status.toLowerCase()}">${o.status}</span></td>
                    <td>${formatDate(o.createdAt)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } else {
          recentEl.innerHTML = '<p class="text-muted text-center p-lg">No recent orders</p>';
        }
      } catch (err) {
        document.getElementById('recent-orders-table').innerHTML = '<p class="text-muted text-center">Failed to load dashboard</p>';
      }
    });
  </script>
</body>
</html>
