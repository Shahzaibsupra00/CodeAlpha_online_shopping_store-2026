<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — Admin — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button><div id="auth-nav" style="display:none;"></div><div class="user-menu" id="user-nav" style="display:none;"><button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">Admin</span> ▾</button><div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html">👤 My Profile</a><a href="/pages/admin/dashboard.html" id="admin-link">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div></div></div></div></header>

  <main class="admin-page">
    <div class="container">
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <h3>Admin Panel</h3>
          <nav class="admin-nav">
            <a href="/pages/admin/dashboard.html"><span class="icon">📊</span> Dashboard</a>
            <a href="/pages/admin/products.html"><span class="icon">📦</span> Products</a>
            <a href="/pages/admin/users.html" class="active"><span class="icon">👥</span> Users</a>
            <a href="/pages/admin/orders.html"><span class="icon">🛒</span> Orders</a>
          </nav>
        </aside>

        <div class="admin-content">
          <div class="admin-content-header"><h1>Users</h1></div>
          <div class="admin-table-container">
            <div class="admin-table-toolbar">
              <div class="admin-table-search"><input type="text" id="user-search" placeholder="🔍 Search users..."></div>
            </div>
            <div id="users-table"><div class="page-loader"><div class="spinner"></div><p>Loading...</p></div></div>
          </div>
          <div id="users-pagination" class="mt-lg"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal" style="max-width:450px;">
      <div class="modal-header"><h3>Edit User</h3><button class="modal-close" id="modal-close">✕</button></div>
      <div class="modal-body">
        <form id="user-form">
          <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="u-name" required></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="u-email" required></div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select class="form-select" id="u-role"><option value="user">User</option><option value="admin">Admin</option></select>
          </div>
          <input type="hidden" id="u-id">
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { adminGetUsers, adminUpdateUser, adminDeleteUser } from '/js/admin/admin.js';
    import { isAdmin } from '/js/auth/auth.js';
    import { formatDate, debounce, renderPagination } from '/js/utils/helpers.js';
    import { showToast } from '/js/utils/toast.js';
    import { confirmDialog } from '/js/utils/modal.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isAdmin()) { window.location.href = '/'; return; }

      const tableEl = document.getElementById('users-table');
      const paginationEl = document.getElementById('users-pagination');
      const modal = document.getElementById('user-modal');
      let currentPage = 1, searchQuery = '';

      const loadUsers = async () => {
        try {
          const data = await adminGetUsers({ page: currentPage, search: searchQuery });
          const users = data.data;

          if (!users || users.length === 0) {
            tableEl.innerHTML = '<p class="text-center text-muted p-xl">No users found</p>';
            return;
          }

          tableEl.innerHTML = `
            <table class="admin-table">
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
              <tbody>
                ${users.map((u) => `
                  <tr>
                    <td><strong>${u.name}</strong></td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.role === 'admin' ? 'primary' : 'success'}">${u.role}</span></td>
                    <td>${formatDate(u.createdAt)}</td>
                    <td class="actions">
                      <button class="edit-btn" data-user='${JSON.stringify({ _id: u._id, name: u.name, email: u.email, role: u.role })}' title="Edit">✏️</button>
                      <button class="delete-btn" data-id="${u._id}" title="Delete">🗑️</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;

          paginationEl.innerHTML = data.pagination ? renderPagination(data.pagination) : '';

          tableEl.querySelectorAll('.edit-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
              const user = JSON.parse(btn.dataset.user);
              document.getElementById('u-id').value = user._id;
              document.getElementById('u-name').value = user.name;
              document.getElementById('u-email').value = user.email;
              document.getElementById('u-role').value = user.role;
              modal.classList.add('active');
            });
          });

          tableEl.querySelectorAll('.delete-btn').forEach((btn) => {
            btn.addEventListener('click', async () => {
              const ok = await confirmDialog('Delete this user?');
              if (ok) {
                try { await adminDeleteUser(btn.dataset.id); showToast('User deleted', 'success'); loadUsers(); }
                catch (err) { showToast(err.message || 'Delete failed', 'error'); }
              }
            });
          });

          paginationEl.querySelectorAll('.pagination-btn').forEach((btn) => {
            btn.addEventListener('click', () => { if (btn.dataset.page) { currentPage = parseInt(btn.dataset.page); loadUsers(); } });
          });
        } catch { tableEl.innerHTML = '<p class="text-center text-muted">Failed to load users</p>'; }
      };

      document.getElementById('user-search').addEventListener('input', debounce((e) => {
        searchQuery = e.target.value; currentPage = 1; loadUsers();
      }, 400));

      const closeModal = () => { modal.classList.remove('active'); };
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

      document.getElementById('user-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          await adminUpdateUser(document.getElementById('u-id').value, {
            name: document.getElementById('u-name').value,
            email: document.getElementById('u-email').value,
            role: document.getElementById('u-role').value,
          });
          showToast('User updated!', 'success');
          closeModal();
          loadUsers();
        } catch (err) { showToast(err.message || 'Update failed', 'error'); }
      });

      loadUsers();
    });
  </script>
</body>
</html>
