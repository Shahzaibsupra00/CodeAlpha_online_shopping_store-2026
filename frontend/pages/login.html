<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button></div></div></header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in-up">
      <div class="auth-header">
        <div class="logo">ShopVerse</div>
        <h1>Welcome Back</h1>
        <p>Login to your account to continue shopping</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>
        <div class="auth-options">
          <label class="form-check"><input type="checkbox" id="remember"><span>Remember me</span></label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Login →</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/register.html">Create Account</a>
      </div>
    </div>
  </main>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { initLoginPage, isAuthenticated } from '/js/auth/auth.js';
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) { window.location.href = '/'; return; }
      initLoginPage();
    });
  </script>
</body>
</html>
