<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header"><div class="container"><a href="/" class="logo">ShopVerse</a><nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a></nav><div class="nav-icons"><button class="nav-icon theme-toggle" id="theme-toggle">🌙</button></div></div></header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in-up">
      <div class="auth-header">
        <div class="logo">ShopVerse</div>
        <h1>Create Account</h1>
        <p>Join us and start shopping today</p>
      </div>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Create a password" required>
          <div class="password-strength">
            <div class="password-strength-bar"><div class="password-strength-fill"></div></div>
            <div class="password-strength-text"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input type="password" class="form-input" id="confirm-password" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account →</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Login</a>
      </div>
    </div>
  </main>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { initRegisterPage, isAuthenticated } from '/js/auth/auth.js';
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) { window.location.href = '/'; return; }
      initRegisterPage();
    });
  </script>
</body>
</html>
