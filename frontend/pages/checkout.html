<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ShopVerse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">ShopVerse</a>
      <nav class="nav-links" id="nav-links"><a href="/">Home</a><a href="/pages/products.html">Products</a><a href="/pages/cart.html">Cart</a></nav>
      <div class="nav-icons">
        <button class="nav-icon theme-toggle" id="theme-toggle">🌙</button>
        <a href="/pages/cart.html" class="nav-icon">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a>
        <div id="auth-nav" style="display:none;"></div>
        <div class="user-menu" id="user-nav" style="display:none;">
          <button class="user-menu-btn" id="user-menu-btn">👤 <span id="user-name">User</span> ▾</button>
          <div class="user-dropdown" id="user-dropdown"><a href="/pages/profile.html">👤 My Profile</a><a href="/pages/orders.html">📦 My Orders</a><a href="/pages/admin/dashboard.html" id="admin-link" style="display:none;">⚙️ Admin Panel</a><div class="divider"></div><button id="logout-btn">🚪 Logout</button></div>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="checkout-page">
    <div class="container">
      <h1>Checkout</h1>
      <div class="checkout-steps">
        <div class="checkout-step active"><span class="step-number">1</span> Shipping</div>
        <div class="checkout-step"><span class="step-number">2</span> Payment</div>
        <div class="checkout-step"><span class="step-number">3</span> Confirm</div>
      </div>

      <div class="checkout-layout">
        <div>
          <form id="checkout-form">
            <div class="checkout-section">
              <h3>📦 Shipping Information</h3>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-input" id="fullName" required></div>
                <div class="form-group"><label class="form-label">Phone *</label><input type="tel" class="form-input" id="phone" required></div>
              </div>
              <div class="form-group"><label class="form-label">Street Address *</label><input type="text" class="form-input" id="street" required></div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">City *</label><input type="text" class="form-input" id="city" required></div>
                <div class="form-group"><label class="form-label">State *</label><input type="text" class="form-input" id="state" required></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">ZIP Code *</label><input type="text" class="form-input" id="zipCode" required></div>
                <div class="form-group"><label class="form-label">Country *</label><input type="text" class="form-input" id="country" value="United States" required></div>
              </div>
            </div>

            <div class="checkout-section">
              <h3>💳 Payment Method</h3>
              <div class="payment-methods">
                <label class="payment-method selected">
                  <input type="radio" name="payment" value="Cash on Delivery" checked>
                  <span class="payment-method-label">💵 Cash on Delivery</span>
                </label>
                <label class="payment-method">
                  <input type="radio" name="payment" value="Credit/Debit Card">
                  <span class="payment-method-label">💳 Credit/Debit Card</span>
                </label>
                <label class="payment-method">
                  <input type="radio" name="payment" value="PayPal">
                  <span class="payment-method-label">🅿️ PayPal</span>
                </label>
                <label class="payment-method">
                  <input type="radio" name="payment" value="Bank Transfer">
                  <span class="payment-method-label">🏦 Bank Transfer</span>
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block" id="place-order-btn">Place Order →</button>
          </form>
        </div>

        <div class="order-summary" id="order-summary">
          <h3>Order Summary</h3>
          <div id="order-items">Loading...</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 ShopVerse. All rights reserved.</span></div></div></footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getCart, calculateCartTotal } from '/js/cart/cart.js';
    import { createOrder } from '/js/order/order.js';
    import { isAuthenticated } from '/js/auth/auth.js';
    import { formatPrice, getImageUrl } from '/js/utils/helpers.js';
    import { showToast } from '/js/utils/toast.js';
    import { setButtonLoading } from '/js/utils/loader.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isAuthenticated()) {
        window.location.href = '/pages/login.html';
        return;
      }

      // Payment method selection
      document.querySelectorAll('.payment-method').forEach((m) => {
        m.addEventListener('click', () => {
          document.querySelectorAll('.payment-method').forEach((pm) => pm.classList.remove('selected'));
          m.classList.add('selected');
        });
      });

      // Load cart summary
      const cart = await getCart();
      const products = cart.products || [];
      const total = calculateCartTotal(products);
      const orderItems = document.getElementById('order-items');

      if (products.length === 0) {
        window.location.href = '/pages/cart.html';
        return;
      }

      orderItems.innerHTML = `
        ${products.map((item) => {
          const p = item.product;
          const img = p?.images?.[0] ? getImageUrl(p.images[0]) : '';
          return `
            <div class="order-summary-item">
              <div class="order-summary-item-image">
                ${img ? `<img src="${img}" alt="">` : '📦'}
              </div>
              <div class="order-summary-item-details">
                <div class="name">${p?.title || 'Product'}</div>
                <div class="qty">Qty: ${item.quantity}</div>
              </div>
              <div class="item-total">${formatPrice((p?.price || 0) * item.quantity)}</div>
            </div>
          `;
        }).join('')}
        <div class="order-summary-totals">
          <div class="order-summary-row"><span>Subtotal</span><span>${formatPrice(total)}</span></div>
          <div class="order-summary-row"><span>Shipping</span><span>${total > 50 ? 'Free' : formatPrice(9.99)}</span></div>
          <div class="order-summary-row total"><span>Total</span><span>${formatPrice(total > 50 ? total : total + 9.99)}</span></div>
        </div>
      `;

      // Place order
      document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('place-order-btn');
        setButtonLoading(btn, true);

        const shippingAddress = {
          fullName: document.getElementById('fullName').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          street: document.getElementById('street').value.trim(),
          city: document.getElementById('city').value.trim(),
          state: document.getElementById('state').value.trim(),
          zipCode: document.getElementById('zipCode').value.trim(),
          country: document.getElementById('country').value.trim(),
        };

        const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

        // Validate
        for (const [key, val] of Object.entries(shippingAddress)) {
          if (!val) {
            showToast(`Please fill in ${key}`, 'error');
            setButtonLoading(btn, false);
            return;
          }
        }

        try {
          const data = await createOrder({ shippingAddress, paymentMethod });
          showToast('Order placed successfully!', 'success');
          setTimeout(() => {
            window.location.href = `/pages/order-success.html?id=${data.data.order._id}`;
          }, 500);
        } catch (error) {
          showToast(error.message || 'Failed to place order', 'error');
          setButtonLoading(btn, false);
        }
      });
    });
  </script>
</body>
</html>
